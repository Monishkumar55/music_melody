name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'songstr/app/**'

jobs:
  build-android-apk:
    name: Build Standalone Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Mobile App Dependencies
        working-directory: songstr/app
        run: npm ci || npm install

      - name: Run Expo Prebuild
        working-directory: songstr/app
        run: npx expo prebuild --platform android --no-install

      - name: Build Android Debug APK
        working-directory: songstr/app/android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Songstr-Android-APK
          path: songstr/app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
