name: Continuous Integration & E2E Testing

on:
  workflow_dispatch:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  CI: true
  NODE_ENV: test

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  #  JOB 1 — Unit & Integration Tests (Mocha + Supertest)
  # ═══════════════════════════════════════════════════════════════════════
  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci || npm install

      - name: Install songstr dependencies
        run: |
          if [ -d "songstr" ]; then
            cd songstr && npm ci || npm install
          fi

      - name: Run Unit & Integration Tests
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          mkdir -p ../test-results
          npx mocha test/api.test.js test/get.test.js test/profile.test.js \
            --retries 2 \
            --timeout 15000 \
            --exit \
            --reporter mocha-junit-reporter \
            --reporter-options mochaFile=../test-results/unit-integration.xml

      - name: Upload Unit Test JUnit Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit-integration
          path: test-results/unit-integration.xml
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════
  #  JOB 2 — Selenium Web UI E2E Tests
  # ═══════════════════════════════════════════════════════════════════════
  selenium-e2e:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi

      - name: Start application server
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          node server.js &
          npx -y wait-on http://localhost:3000 --timeout 30000 --interval 1000

      - name: Run Selenium E2E tests
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          mkdir -p ../test-results
          npx mocha test/selenium.e2e.js \
            --retries 2 \
            --timeout 60000 \
            --exit \
            --reporter mocha-junit-reporter \
            --reporter-options mochaFile=../test-results/selenium-e2e.xml

      - name: Upload Selenium JUnit Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-selenium-e2e
          path: test-results/selenium-e2e.xml
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════
  #  JOB 3 — Mobile E2E Tests (Chrome Mobile Emulation)
  # ═══════════════════════════════════════════════════════════════════════
  mobile-e2e:
    name: Mobile E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi

      - name: Start application server
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          node server.js &
          npx -y wait-on http://localhost:3000 --timeout 30000 --interval 1000

      - name: Run Mobile E2E tests
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          mkdir -p ../test-results
          npx mocha test/mobile.e2e.js \
            --retries 2 \
            --timeout 60000 \
            --exit \
            --reporter mocha-junit-reporter \
            --reporter-options mochaFile=../test-results/mobile-e2e.xml

      - name: Upload Mobile JUnit Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-mobile-e2e
          path: test-results/mobile-e2e.xml
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════
  #  JOB 4 — Vulnerability & Security Testing
  # ═══════════════════════════════════════════════════════════════════════
  vulnerability-security:
    name: Vulnerability & Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi

      - name: Run Vulnerability & Security Tests
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          mkdir -p ../test-results
          npx mocha test/security.test.js \
            --retries 2 \
            --timeout 15000 \
            --exit \
            --reporter mocha-junit-reporter \
            --reporter-options mochaFile=../test-results/security.xml

      - name: Run Security Audit Check
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          npm audit --audit-level=high || true

      - name: Upload Security JUnit Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-security
          path: test-results/security.xml
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════
  #  JOB 5 — API Load Testing (k6)
  # ═══════════════════════════════════════════════════════════════════════
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi

      - name: Start application server
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          node server.js &
          npx -y wait-on http://localhost:3000 --timeout 30000 --interval 1000

      - name: Run k6 load test
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          k6 run load-test.js || true

  # ═══════════════════════════════════════════════════════════════════════
  #  JOB 6 — Aggregate Test Summary & Results Display
  # ═══════════════════════════════════════════════════════════════════════
  test-summary:
    name: Test Summary & GitHub Results
    needs: [unit-integration, selenium-e2e, mobile-e2e, vulnerability-security, load-tests]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download all JUnit reports
        uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          path: all-reports
          merge-multiple: true

      - name: Publish Test Cases to GitHub Actions UI
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'all-reports/**/*.xml'
          detailed_summary: true
          include_passed: true
          fail_on_failure: true
          check_name: 'Songstr Comprehensive Test Case Results'

      - name: Generate GitHub Actions Step Summary
        if: always()
        run: |
          echo "## Songstr CI - Test Execution Results 🎵" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit & Integration Tests | \`${{ needs.unit-integration.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Selenium E2E Tests | \`${{ needs.selenium-e2e.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile E2E Tests | \`${{ needs.mobile-e2e.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Vulnerability & Security Tests | \`${{ needs.vulnerability-security.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API Load Tests | \`${{ needs.load-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test results and individual test cases have been published to GitHub Actions." >> $GITHUB_STEP_SUMMARY
