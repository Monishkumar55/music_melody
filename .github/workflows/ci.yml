name: Songstr E2E CI Pipeline

on:
  push:
    branches: [ main, test-suite-fixes ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'songstr/package-lock.json'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Node.js dependencies
      run: npm install
      working-directory: songstr

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl requests

    - name: Run ESLint Checks
      run: npm run lint
      working-directory: songstr

    - name: Run E2E Project Validation
      run: python run_validation.py

    - name: Upload Test and Coverage Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: songstr-validation-reports
        path: |
          Validation_Report.txt
          Songstr_QA_Report.xlsx
          appium_report.csv
          appium_report.html
          songstr/test-results.xml
          songstr/mochawesome-report/
          songstr/coverage/
