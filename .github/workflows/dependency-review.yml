name: Dependency Review

on:
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Supply Chain Security Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  npm-audit:
    name: NPM Audit Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi
        shell: bash

      - name: Run NPM Audit (High/Critical)
        run: |
          npm audit --audit-level=high || echo "::error::High/Critical vulnerabilities found during npm audit. Please fix them." && exit 1
        shell: bash
