name: Lighthouse Performance Testing

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lighthouse-ci:
    name: Lighthouse PWA, Performance & Axe Accessibility
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Install Dependencies
      run: |
        npm ci || npm install
        if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi
      shell: bash

    - name: Start Server in Background
      run: |
        if grep -q '"start"' package.json; then
          npm start &
        elif [ -d "songstr" ] && grep -q '"start"' songstr/package.json; then
          cd songstr && npm start &
        fi
        sleep 5 # Wait for server to start
      shell: bash

    - name: Audit URLs using Lighthouse
      uses: treosh/lighthouse-ci-action@v12
      with:
        urls: |
          http://localhost:3000/
        budgetPath: ./lighthouserc.json
        uploadArtifacts: true
        temporaryPublicStorage: true
        runs: 3

    - name: Upload Lighthouse Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-reports
        path: |
          **/.lighthouseci/
        retention-days: 7
