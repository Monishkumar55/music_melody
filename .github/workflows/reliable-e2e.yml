        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi

      - name: Run Mobile E2E tests
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          mkdir -p ../test-results test-results reports demo_reports
          touch test-results/mobile-e2e.xml
          npx mocha --require test/globalHooks.js test/mobile.e2e.js \
            --retries 3 \
