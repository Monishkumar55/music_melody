      - name: Upload Appium JUnit Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-appium-e2e
          path: |
            test-results/appium-e2e.xml
            songstr/test-results/appium-e2e.xml
          if-no-files-found: ignore
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════
  #  JOB 5 — API Load Testing (300 Scenarios)
  # ═══════════════════════════════════════════════════════════════════════
  load-tests:
    name: Load Testing (300 Scenarios)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
