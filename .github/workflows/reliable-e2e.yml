name: Reliable E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  CI: true
  NODE_ENV: test

jobs:
  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi

      - name: Run API tests
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          mkdir -p ../test-results test-results reports demo_reports
          npx mocha --require test/globalHooks.js test/api.test.js test/get.test.js test/profile.test.js test/security.test.js \
            --retries 3 \
            --timeout 15000 \
            --exit \
            --reporter mocha-junit-reporter \
            --reporter-options mochaFile=test-results/unit-integration.xml || true

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit-integration
          path: |
            test-results/unit-integration.xml
            songstr/test-results/unit-integration.xml
          retention-days: 14

  selenium-e2e:
    name: Selenium E2E (Chrome Headless)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi

      - name: Run Selenium E2E tests
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          mkdir -p ../test-results test-results reports demo_reports
          npx mocha --require test/globalHooks.js test/selenium.e2e.js \
            --retries 3 \
            --timeout 60000 \
            --exit \
            --reporter mocha-junit-reporter \
            --reporter-options mochaFile=test-results/selenium-e2e.xml || true

      - name: Upload Selenium JUnit Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-selenium-e2e
          path: |
            test-results/selenium-e2e.xml
            songstr/test-results/selenium-e2e.xml
          retention-days: 14
