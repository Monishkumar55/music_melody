      - name: Upload Mobile JUnit Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-mobile-e2e
          path: |
            test-results/mobile-e2e.xml
            songstr/test-results/mobile-e2e.xml
          if-no-files-found: ignore
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════
