      - name: Install dependencies
        run: |
          npm ci || npm install
          if [ -d "songstr" ]; then cd songstr && npm ci || npm install; fi

      - name: Run Appium Mobile E2E tests
        run: |
          TARGET_DIR="."
          if [ -d "songstr" ]; then TARGET_DIR="songstr"; fi
          cd $TARGET_DIR
          mkdir -p ../test-results test-results reports demo_reports
          touch test-results/appium-e2e.xml
          npx mocha --require test/globalHooks.js test/appium.e2e.js \
            --retries 3 \
            --timeout 60000 \
            --exit \
